services:
  - type: web
    name: studyhive-api
    env: node
    region: oregon          # change to: frankfurt | singapore | ohio
    plan: free              # upgrade to starter for always-on
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: studyhive-db
          property: connectionString
      # Set the secrets below in Render dashboard → Environment
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: studyhive-db
    plan: free
    databaseName: studyhive
    region: oregon
